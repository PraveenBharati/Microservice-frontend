apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: production
  labels:
    app: frontend
    component: ui
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>QUAD_CART — Built by Praveen Bharati</title>
      <link rel="preconnect" href="https://fonts.googleapis.com"/>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
          --bg:       #020207;
          --bg2:      #08080f;
          --bg3:      #0e0e1a;
          --surface:  #111120;
          --border:   rgba(255,255,255,0.06);
          --border2:  rgba(255,255,255,0.12);
          --accent:   #00f0ff;
          --accent2:  #7000ff;
          --pink:     #ff2d78;
          --green:    #00ff8c;
          --amber:    #ffb800;
          --text:     #e2e2f0;
          --muted:    #555570;
          --mono:     'JetBrains Mono', monospace;
          --sans:     'Outfit', sans-serif;
        }

        html, body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          min-height: 100vh;
          overflow-x: hidden;
        }

        /* === SCANLINE OVERLAY === */
        body::after {
          content: '';
          position: fixed; inset: 0; z-index: 0; pointer-events: none;
          background: repeating-linear-gradient(
            0deg, transparent, transparent 2px,
            rgba(0,240,255,0.015) 2px, rgba(0,240,255,0.015) 4px
          );
        }

        /* === GRID BG === */
        body::before {
          content: '';
          position: fixed; inset: 0; z-index: 0; pointer-events: none;
          background-image:
            linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
          background-size: 48px 48px;
        }

        /* === AMBIENT GLOWS === */
        .glow { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(140px); }
        .g1 { width: 800px; height: 800px; background: var(--accent2); top: -300px; left: -200px; opacity: 0.1; }
        .g2 { width: 600px; height: 600px; background: var(--accent); bottom: -200px; right: -100px; opacity: 0.07; }
        .g3 { width: 400px; height: 400px; background: var(--pink); top: 40%; left: 40%; opacity: 0.05; }

        /* === PAGE LAYOUT === */
        .page { position: relative; z-index: 1; max-width: 1120px; margin: 0 auto; padding: 0 28px 100px; }

        /* === NAV === */
        nav {
          display: flex; align-items: center; justify-content: space-between;
          padding: 24px 0; border-bottom: 1px solid var(--border);
          margin-bottom: 72px;
        }
        .logo {
          font-family: var(--mono); font-size: 20px; font-weight: 700;
          letter-spacing: 0.05em; display: flex; align-items: center; gap: 2px;
        }
        .logo-quad { color: var(--accent); text-shadow: 0 0 20px rgba(0,240,255,0.6); }
        .logo-under { color: var(--muted); }
        .logo-cart { color: var(--text); }

        .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-pill {
          font-family: var(--mono); font-size: 11px; padding: 5px 12px;
          border-radius: 6px; display: flex; align-items: center; gap: 7px;
        }
        .nav-pill.live {
          background: rgba(0,255,140,0.06); border: 1px solid rgba(0,255,140,0.2);
          color: var(--green);
        }
        .nav-pill.live::before {
          content: ''; width: 6px; height: 6px; border-radius: 50%;
          background: var(--green); box-shadow: 0 0 10px var(--green);
          animation: pulse 1.8s ease-in-out infinite;
        }
        .nav-pill.argo {
          background: rgba(0,240,255,0.06); border: 1px solid rgba(0,240,255,0.2);
          color: var(--accent);
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.8)} }

        /* === HERO === */
        .hero { margin-bottom: 80px; }
        .hero-tag {
          display: inline-flex; align-items: center; gap: 8px;
          font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
          text-transform: uppercase; color: var(--accent);
          border: 1px solid rgba(0,240,255,0.2); padding: 5px 14px;
          border-radius: 4px; margin-bottom: 32px;
          background: rgba(0,240,255,0.04);
        }
        .hero-tag::before { content:'▶'; font-size:8px; }

        .hero h1 {
          font-size: clamp(3.5rem, 8vw, 7rem);
          font-weight: 900; line-height: 0.95; letter-spacing: -3px;
          margin-bottom: 28px;
        }
        .h1-q {
          display: block;
          color: var(--accent);
          text-shadow: 0 0 60px rgba(0,240,255,0.4), 0 0 120px rgba(0,240,255,0.15);
        }
        .h1-uad { display: block; color: #fff; }
        .h1-cart {
          display: block;
          -webkit-text-stroke: 1px rgba(255,255,255,0.3);
          color: transparent;
        }

        .hero-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 40px; flex-wrap: wrap; }
        .hero-left { flex: 1; min-width: 280px; }
        .hero-desc {
          font-size: 16px; color: var(--muted); line-height: 1.8; max-width: 480px;
          margin-bottom: 32px;
        }
        .hero-desc strong { color: var(--text); font-weight: 500; }
        .hero-btns { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn-cyber {
          font-family: var(--mono); font-size: 12px; font-weight: 700;
          letter-spacing: 0.1em; text-transform: uppercase;
          padding: 12px 28px; border-radius: 6px; cursor: pointer;
          transition: all 0.15s;
        }
        .btn-cyber.primary {
          background: var(--accent); color: #000; border: none;
          box-shadow: 0 0 30px rgba(0,240,255,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .btn-cyber.primary:hover { box-shadow: 0 0 60px rgba(0,240,255,0.6); transform: translateY(-1px); }
        .btn-cyber.ghost {
          background: transparent; color: var(--text);
          border: 1px solid var(--border2);
        }
        .btn-cyber.ghost:hover { border-color: var(--accent); color: var(--accent); }

        /* Terminal box */
        .hero-terminal {
          background: var(--bg2); border: 1px solid var(--border2);
          border-radius: 12px; padding: 20px 22px; flex-shrink: 0;
          width: 320px; font-family: var(--mono); font-size: 12px;
        }
        .term-bar {
          display: flex; align-items: center; gap: 7px; margin-bottom: 16px;
          padding-bottom: 12px; border-bottom: 1px solid var(--border);
        }
        .term-dot { width: 10px; height: 10px; border-radius: 50%; }
        .term-title { font-size: 11px; color: var(--muted); margin-left: auto; }
        .term-line { margin: 4px 0; line-height: 1.7; }
        .t-dim   { color: var(--muted); }
        .t-green { color: var(--green); }
        .t-cyan  { color: var(--accent); }
        .t-white { color: var(--text); }
        .t-pink  { color: var(--pink); }
        .cursor { display: inline-block; width: 8px; height: 14px; background: var(--accent); vertical-align: middle; animation: blink2 1s step-end infinite; }
        @keyframes blink2 { 50% { opacity: 0; } }

        /* === STATS === */
        .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 72px; }
        .stat {
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 12px; padding: 22px 18px; position: relative; overflow: hidden;
          transition: border-color 0.2s, transform 0.2s;
        }
        .stat::before {
          content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
          background: linear-gradient(90deg, transparent, var(--accent), transparent);
          opacity: 0.4;
        }
        .stat:hover { border-color: rgba(0,240,255,0.25); transform: translateY(-2px); }
        .stat-lbl { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px; }
        .stat-val { font-size: 30px; font-weight: 800; letter-spacing: -1px; color: #fff; }
        .stat-sub { font-family: var(--mono); font-size: 10px; color: var(--green); margin-top: 6px; }

        /* === SECTION HEADERS === */
        .sh { margin-bottom: 28px; }
        .sh-title { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
        .sh-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); }

        /* === PRODUCTS === */
        .products-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 18px; margin-bottom: 72px; }
        .pc {
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 16px; overflow: hidden; cursor: pointer;
          transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
          position: relative;
        }
        .pc::after {
          content: ''; position: absolute; inset: 0; border-radius: 16px;
          background: linear-gradient(135deg, rgba(0,240,255,0.04), transparent 60%);
          pointer-events: none;
        }
        .pc:hover {
          border-color: rgba(0,240,255,0.35);
          transform: translateY(-5px);
          box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,240,255,0.08);
        }
        .pc-img {
          height: 160px; display: flex; align-items: center; justify-content: center;
          font-size: 56px; position: relative; overflow: hidden;
        }
        .pc-img-inner { position: absolute; inset: 0; }
        .pc-img span { position: relative; z-index: 1; filter: drop-shadow(0 0 20px rgba(0,240,255,0.4)); }
        .pc-body { padding: 16px; }
        .pc-cat { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 5px; color: var(--accent); }
        .pc-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .pc-desc { font-size: 11px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
        .pc-foot { display: flex; align-items: center; justify-content: space-between; }
        .pc-price { font-family: var(--mono); font-size: 16px; font-weight: 700; color: #fff; }
        .pc-price small { font-size: 10px; color: var(--muted); font-weight: 400; }
        .pc-add {
          width: 30px; height: 30px; border-radius: 7px; font-size: 16px;
          background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.25);
          color: var(--accent); display: flex; align-items: center; justify-content: center;
          cursor: pointer; transition: all 0.15s;
        }
        .pc-add:hover { background: var(--accent); color: #000; transform: scale(1.1); box-shadow: 0 0 16px rgba(0,240,255,0.5); }

        /* === PIPELINE === */
        .pipeline-wrap { margin-bottom: 72px; }
        .pipeline-box {
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 16px; padding: 28px 28px 32px; position: relative; overflow: hidden;
        }
        .pipeline-box::before {
          content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
          background: linear-gradient(90deg, var(--accent2), var(--accent), var(--green));
        }
        .pipe-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
        .pipe-top-left { font-family: var(--mono); font-size: 12px; color: var(--muted); }
        .pipe-top-left strong { color: var(--accent); }
        .synced-badge {
          font-family: var(--mono); font-size: 10px; display: flex; align-items: center; gap: 7px;
          background: rgba(0,255,140,0.07); border: 1px solid rgba(0,255,140,0.2);
          color: var(--green); padding: 5px 12px; border-radius: 6px;
        }
        .synced-badge::before { content:''; width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite; }

        .steps { display: flex; align-items: center; overflow-x: auto; padding-bottom: 4px; }
        .step-node { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
        .step-box {
          width: 56px; height: 56px; border-radius: 14px; font-size: 24px;
          display: flex; align-items: center; justify-content: center;
          background: var(--bg2); border: 1px solid var(--border2); margin-bottom: 10px;
          position: relative; transition: border-color 0.2s;
        }
        .step-box.done {
          border-color: rgba(0,240,255,0.4);
          box-shadow: 0 0 20px rgba(0,240,255,0.12), inset 0 0 20px rgba(0,240,255,0.04);
        }
        .step-box.done::after {
          content: '✓'; position: absolute; top: -7px; right: -7px;
          width: 16px; height: 16px; background: var(--green); border-radius: 50%;
          font-size: 9px; font-weight: 900; color: #000;
          display: flex; align-items: center; justify-content: center;
        }
        .step-name { font-size: 11px; font-weight: 600; color: var(--text); text-align: center; }
        .step-meta { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 2px; text-align: center; }
        .step-wire {
          flex: 1; height: 2px; background: var(--border2); min-width: 24px;
          position: relative; overflow: hidden; flex-shrink: 0;
        }
        .step-wire-flow {
          position: absolute; inset: 0;
          background: linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
          animation: wireflow 2s linear infinite;
        }
        @keyframes wireflow { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

        /* === INFRA GRID === */
        .infra-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 72px; }
        .ic {
          background: var(--bg3); border: 1px solid var(--border);
          border-radius: 16px; padding: 22px;
        }
        .ic-head {
          font-family: var(--mono); font-size: 10px; color: var(--muted);
          text-transform: uppercase; letter-spacing: 0.12em;
          margin-bottom: 18px; display: flex; align-items: center; gap: 7px;
        }
        .ic-head::before { content: ''; width: 3px; height: 12px; border-radius: 2px; background: var(--accent); }

        .app-row {
          display: flex; align-items: center; justify-content: space-between;
          padding: 9px 11px; border-radius: 9px; margin-bottom: 7px;
          background: var(--bg2); border: 1px solid var(--border);
          transition: border-color 0.2s;
        }
        .app-row:hover { border-color: var(--border2); }
        .app-row-l { display: flex; align-items: center; gap: 10px; }
        .app-ico { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
        .app-n { font-size: 13px; font-weight: 600; }
        .app-ns { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 1px; }
        .app-badges { display: flex; gap: 5px; }
        .badge {
          font-family: var(--mono); font-size: 9px; font-weight: 700; padding: 3px 7px;
          border-radius: 4px; text-transform: uppercase; letter-spacing: 0.05em;
        }
        .badge.h { background: rgba(0,255,140,0.1); color: var(--green); border: 1px solid rgba(0,255,140,0.2); }
        .badge.s { background: rgba(0,240,255,0.1); color: var(--accent); border: 1px solid rgba(0,240,255,0.2); }

        /* K8s nodes */
        .nodes-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; }
        .knode {
          background: var(--bg2); border: 1px solid var(--border);
          border-radius: 9px; padding: 11px 8px; text-align: center;
        }
        .knode-name { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 5px; }
        .knode-status { font-family: var(--mono); font-size: 11px; font-weight: 700; color: var(--green); }
        .knode-cpu { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 3px; }
        .knode-bar { height: 3px; background: var(--border2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .knode-fill { height: 100%; border-radius: 2px; background: var(--accent); }

        .pods-row { display: flex; flex-wrap: wrap; gap: 6px; }
        .pod-tag {
          font-family: var(--mono); font-size: 9px; padding: 3px 8px; border-radius: 4px;
          background: rgba(0,255,140,0.07); border: 1px solid rgba(0,255,140,0.18); color: var(--green);
        }

        /* === BUILT BY === */
        .built-by {
          border-top: 1px solid var(--border); padding-top: 64px; text-align: center;
        }
        .by-label { font-family: var(--mono); font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.18em; margin-bottom: 16px; }
        .by-name {
          font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 900;
          letter-spacing: -2px; line-height: 1;
          color: #fff;
          text-shadow: 0 0 80px rgba(0,240,255,0.25);
          margin-bottom: 10px;
        }
        .by-name span { color: var(--accent); text-shadow: 0 0 40px rgba(0,240,255,0.6); }
        .by-role { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-bottom: 28px; letter-spacing: 0.05em; }
        .tech-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .tech {
          font-family: var(--mono); font-size: 10px; padding: 5px 12px; border-radius: 5px;
          background: rgba(255,255,255,0.03); border: 1px solid var(--border2); color: var(--muted);
          transition: all 0.2s; cursor: default;
        }
        .tech:hover { border-color: var(--accent); color: var(--accent); background: rgba(0,240,255,0.05); }

        /* === FADE UP ANIMATION === */
        @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
        .fu  { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
        .d1  { animation-delay: 0.05s; }
        .d2  { animation-delay: 0.15s; }
        .d3  { animation-delay: 0.25s; }
        .d4  { animation-delay: 0.35s; }
        .d5  { animation-delay: 0.45s; }

        /* === RESPONSIVE === */
        @media(max-width:768px) {
          .stats-row { grid-template-columns: repeat(2,1fr); }
          .products-grid { grid-template-columns: repeat(2,1fr); }
          .infra-grid { grid-template-columns: 1fr; }
          .hero-terminal { width: 100%; }
        }
        @media(max-width:480px) {
          .products-grid { grid-template-columns: 1fr; }
        }
      </style>
    </head>
    <body>
      <div class="glow g1"></div>
      <div class="glow g2"></div>
      <div class="glow g3"></div>

      <div class="page">

        <!-- NAV -->
        <nav class="fu">
          <div class="logo">
            <span class="logo-quad">QUAD</span><span class="logo-under">_</span><span class="logo-cart">CART</span>
          </div>
          <div class="nav-right">
            <div class="nav-pill live">K8s · Live</div>
            <div class="nav-pill argo">ArgoCD · Synced</div>
          </div>
        </nav>

        <!-- HERO -->
        <section class="hero fu d1">
          <div class="hero-tag">GitOps · Kubernetes · Kind Cluster · nginx:alpine</div>
          <div class="hero-row">
            <div class="hero-left">
              <h1>
                <span class="h1-q">Q</span>
                <span class="h1-uad">UAD</span>
                <span class="h1-cart">_CART</span>
              </h1>
              <p class="hero-desc">
                A <strong>production-grade</strong> e-commerce platform deployed on
                <strong>Kubernetes</strong> using pure <strong>GitOps</strong>.
                Zero custom images. Every commit auto-synced via <strong>ArgoCD</strong>.
                No downtime. Ever.
              </p>
              <div class="hero-btns">
                <button class="btn-cyber primary">EXPLORE STORE</button>
                <button class="btn-cyber ghost">VIEW PIPELINE →</button>
              </div>
            </div>

            <!-- TERMINAL -->
            <div class="hero-terminal">
              <div class="term-bar">
                <div class="term-dot" style="background:#ff5f57"></div>
                <div class="term-dot" style="background:#febc2e"></div>
                <div class="term-dot" style="background:#28c840"></div>
                <span class="term-title">argocd · production</span>
              </div>
              <div class="term-line"><span class="t-dim">$</span> <span class="t-cyan">kubectl</span> <span class="t-white">get pods -n production</span></div>
              <div class="term-line" style="margin-top:8px">
                <span class="t-green">✔</span> <span class="t-white">frontend</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="t-green">Running</span>
              </div>
              <div class="term-line"><span class="t-green">✔</span> <span class="t-white">auth-service</span>&nbsp;&nbsp;&nbsp;<span class="t-green">Running</span></div>
              <div class="term-line"><span class="t-green">✔</span> <span class="t-white">order-service</span>&nbsp;&nbsp;<span class="t-green">Running</span></div>
              <div class="term-line"><span class="t-green">✔</span> <span class="t-white">cart-service</span>&nbsp;&nbsp;&nbsp;<span class="t-green">Running</span></div>
              <div class="term-line"><span class="t-green">✔</span> <span class="t-white">payment-svc</span>&nbsp;&nbsp;&nbsp;&nbsp;<span class="t-green">Running</span></div>
              <div class="term-line" style="margin-top:10px">
                <span class="t-dim">$</span> <span class="t-cyan">argocd</span> <span class="t-white">app get frontend</span>
              </div>
              <div class="term-line"><span class="t-dim">Health:</span> <span class="t-green">Healthy</span></div>
              <div class="term-line"><span class="t-dim">Sync:</span>&nbsp;&nbsp;<span class="t-cyan">Synced · 1m ago</span></div>
              <div class="term-line" style="margin-top:10px"><span class="t-dim">$</span> <span class="cursor"></span></div>
            </div>
          </div>
        </section>

        <!-- STATS -->
        <div class="stats-row fu d2">
          <div class="stat">
            <div class="stat-lbl">Total Orders</div>
            <div class="stat-val">2.1M</div>
            <div class="stat-sub">↑ 24% this month</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Uptime SLA</div>
            <div class="stat-val">99.99%</div>
