apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: production
  labels:
    app: frontend
    component: ui
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>QUAD_CART — Praveen Bharati</title>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#020208;--bg2:#08080f;--bg3:#0d0d18;
          --b1:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.12);
          --cyan:#00f0ff;--violet:#7000ff;--pink:#ff2d78;--green:#00ff8c;--amber:#ffb800;
          --txt:#e2e2f0;--muted:#55556e;
          --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
        }
        html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
        body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
          background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.01) 2px,rgba(0,240,255,0.01) 4px)}
        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
          background-image:linear-gradient(rgba(0,240,255,0.022) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.022) 1px,transparent 1px);
          background-size:48px 48px}
        .glow{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(140px)}
        .g1{width:700px;height:700px;background:var(--violet);top:-300px;left:-200px;opacity:.1}
        .g2{width:500px;height:500px;background:var(--cyan);bottom:-200px;right:-100px;opacity:.07}

        .page{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 24px 48px}

        /* ── TOP BAR: name + logo + status ── */
        .topbar{
          display:flex;align-items:center;justify-content:space-between;
          padding:14px 0 12px;border-bottom:1px solid var(--b1);margin-bottom:16px;
        }
        .tb-left{display:flex;align-items:center;gap:14px}
        .by-name{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--cyan);
          text-shadow:0 0 16px rgba(0,240,255,.5);letter-spacing:.04em}
        .by-role{font-family:var(--mono);font-size:10px;color:var(--muted)}
        .divider{width:1px;height:28px;background:var(--b2)}
        .logo{font-family:var(--mono);font-size:18px;font-weight:700;letter-spacing:.04em}
        .lq{color:var(--cyan);text-shadow:0 0 20px rgba(0,240,255,.6)}
        .lu{color:var(--muted)}.lc{color:#fff}
        .tb-right{display:flex;align-items:center;gap:8px}
        .pill{font-family:var(--mono);font-size:9px;padding:4px 9px;border-radius:4px;display:flex;align-items:center;gap:5px}
        .pill.live{background:rgba(0,255,140,.06);border:1px solid rgba(0,255,140,.2);color:var(--green)}
        .pill.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 1.8s ease-in-out infinite}
        .pill.argo{background:rgba(0,240,255,.06);border:1px solid rgba(0,240,255,.2);color:var(--cyan)}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

        /* ── HERO ROW: headline + terminal side by side ── */
        .hero-row{display:grid;grid-template-columns:1fr 310px;gap:20px;margin-bottom:16px;align-items:start}
        .hero-left{}
        .hero-eyebrow{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
          color:var(--cyan);border:1px solid rgba(0,240,255,.2);padding:4px 10px;border-radius:3px;
          margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;background:rgba(0,240,255,.04)}
        .hero-eyebrow::before{content:'▶';font-size:7px}
        h1{font-size:clamp(2.6rem,5.5vw,4.8rem);font-weight:900;line-height:.92;letter-spacing:-2.5px;margin-bottom:12px}
        .h1a{display:block;color:var(--cyan);text-shadow:0 0 50px rgba(0,240,255,.4)}
        .h1b{display:block;color:#fff}
        .h1c{display:block;-webkit-text-stroke:1px rgba(255,255,255,.22);color:transparent}
        .hero-desc{font-size:13px;color:var(--muted);line-height:1.7;max-width:520px;margin-bottom:14px}
        .hero-desc strong{color:var(--txt);font-weight:500}
        .hero-btns{display:flex;gap:8px}
        .btn{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border-radius:5px;cursor:pointer;transition:all .15s}
        .btn.p{background:var(--cyan);color:#000;border:none;box-shadow:0 0 24px rgba(0,240,255,.3)}
        .btn.p:hover{box-shadow:0 0 44px rgba(0,240,255,.55);transform:translateY(-1px)}
        .btn.g{background:transparent;color:var(--txt);border:1px solid var(--b2)}
        .btn.g:hover{border-color:var(--cyan);color:var(--cyan)}

        /* terminal */
        .terminal{background:var(--bg2);border:1px solid var(--b2);border-radius:10px;padding:14px 16px;font-family:var(--mono);font-size:10.5px}
        .tbar{display:flex;align-items:center;gap:5px;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--b1)}
        .tdot{width:9px;height:9px;border-radius:50%}
        .ttitle{font-size:9px;color:var(--muted);margin-left:auto}
        .tl{margin:2px 0;line-height:1.65}
        .td{color:var(--muted)}.tg{color:var(--green)}.tc{color:var(--cyan)}.tw{color:var(--txt)}
        .cur{display:inline-block;width:7px;height:12px;background:var(--cyan);vertical-align:middle;animation:cur 1s step-end infinite}
        @keyframes cur{50%{opacity:0}}

        /* ── STATS ROW ── */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
        .stat{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;padding:14px;position:relative;overflow:hidden;transition:border-color .2s}
        .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.3}
        .stat:hover{border-color:rgba(0,240,255,.2)}
        .slbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
        .sval{font-size:22px;font-weight:800;letter-spacing:-1px;color:#fff}
        .ssub{font-family:var(--mono);font-size:9px;color:var(--green);margin-top:4px}

        /* ── TWO COLUMN: products + services ── */
        .main-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}

        .sec-title{font-size:13px;font-weight:700;letter-spacing:-.3px;margin-bottom:4px}
        .sec-sub{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:10px}

        /* products compact */
        .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .pc{background:var(--bg3);border:1px solid var(--b1);border-radius:10px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s}
        .pc:hover{border-color:rgba(0,240,255,.3);transform:translateY(-2px)}
        .pc-img{height:80px;display:flex;align-items:center;justify-content:center;font-size:30px;position:relative;overflow:hidden}
        .pc-bg{position:absolute;inset:0}
        .pc-em{position:relative;z-index:1;filter:drop-shadow(0 0 10px rgba(0,240,255,.3))}
        .pc-b{padding:9px 10px}
        .pc-cat{font-family:var(--mono);font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--cyan);margin-bottom:2px}
        .pc-n{font-size:11px;font-weight:700;margin-bottom:2px}
        .pc-f{display:flex;align-items:center;justify-content:space-between}
        .pc-p{font-family:var(--mono);font-size:11px;font-weight:700;color:#fff}
        .pc-add{width:20px;height:20px;border-radius:4px;font-size:12px;background:rgba(0,240,255,.1);border:1px solid rgba(0,240,255,.25);color:var(--cyan);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
        .pc-add:hover{background:var(--cyan);color:#000}

        /* microservices grid */
        .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
        .svc{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:9px 10px;position:relative;overflow:hidden;transition:border-color .2s}
        .svc::before{content:'';position:absolute;top:0;left:0;width:2px;height:100%}
        .svc.cc::before{background:var(--cyan)}
        .svc.cv::before{background:var(--violet)}
        .svc.cp::before{background:var(--pink)}
        .svc.cg::before{background:var(--green)}
        .svc.ca::before{background:var(--amber)}
        .svc:hover{border-color:var(--b2)}
        .svc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
        .svc-left{display:flex;align-items:center;gap:6px}
        .svc-ico{font-size:13px}
        .svc-name{font-size:11px;font-weight:700}
        .svc-dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2.5s ease-in-out infinite;flex-shrink:0}
        .svc-info{font-family:var(--mono);font-size:8.5px;color:var(--muted)}

        /* ── PIPELINE ── */
        .pipe-wrap{margin-bottom:16px}
        .pipe-box{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;padding:16px 20px;position:relative;overflow:hidden}
        .pipe-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--green))}
        .pipe-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .pipe-lbl{font-family:var(--mono);font-size:10px;color:var(--muted)}
        .pipe-lbl strong{color:var(--cyan)}
        .synced{font-family:var(--mono);font-size:9px;display:flex;align-items:center;gap:6px;background:rgba(0,255,140,.07);border:1px solid rgba(0,255,140,.2);color:var(--green);padding:4px 10px;border-radius:4px}
        .synced::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:blink 2s infinite}
        .steps{display:flex;align-items:center}
        .snode{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
        .sbox{width:44px;height:44px;border-radius:11px;font-size:18px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--b2);margin-bottom:7px;position:relative}
        .sbox.done{border-color:rgba(0,240,255,.4);box-shadow:0 0 14px rgba(0,240,255,.1)}
        .sbox.done::after{content:'✓';position:absolute;top:-6px;right:-6px;width:13px;height:13px;background:var(--green);border-radius:50%;font-size:7px;font-weight:900;color:#000;display:flex;align-items:center;justify-content:center}
        .sname{font-size:9px;font-weight:600;color:var(--txt);text-align:center}
        .smeta{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:1px;text-align:center}
        .wire{flex:1;height:2px;background:var(--b2);min-width:16px;position:relative;overflow:hidden;flex-shrink:0}
        .wflow{position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);animation:wf 2s linear infinite}
        @keyframes wf{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

        /* ── BOTTOM ROW: argocd + nodes ── */
        .bottom-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
        .ic{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;padding:16px}
        .ich{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
        .ich::before{content:'';width:2px;height:10px;border-radius:1px;background:var(--cyan)}
        .arow{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:7px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--b1)}
        .arl{display:flex;align-items:center;gap:7px}
        .aico{font-size:11px}
        .an{font-size:11px;font-weight:600}
        .ans{font-family:var(--mono);font-size:8px;color:var(--muted)}
        .abs{display:flex;gap:4px}
        .ab{font-family:var(--mono);font-size:7px;font-weight:700;padding:2px 5px;border-radius:3px;text-transform:uppercase}
        .ab.h{background:rgba(0,255,140,.1);color:var(--green);border:1px solid rgba(0,255,140,.2)}
        .ab.s{background:rgba(0,240,255,.1);color:var(--cyan);border:1px solid rgba(0,240,255,.2)}
        .ng{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px}
        .kn{background:var(--bg2);border:1px solid var(--b1);border-radius:7px;padding:8px;text-align:center}
        .knn{font-family:var(--mono);font-size:8px;color:var(--muted);margin-bottom:3px}
        .kns{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green)}
        .knc{font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:2px}
        .knb{height:2px;background:var(--b1);border-radius:1px;margin-top:4px;overflow:hidden}
        .knf{height:100%;border-radius:1px;background:var(--cyan)}
        .pr{display:flex;flex-wrap:wrap;gap:4px}
        .pt{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(0,255,140,.07);border:1px solid rgba(0,255,140,.15);color:var(--green)}

        /* ── FOOTER ── */
        .footer{border-top:1px solid var(--b1);padding-top:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
        .footer-name{font-family:var(--mono);font-size:12px;font-weight:700}
        .footer-name span{color:var(--cyan);text-shadow:0 0 16px rgba(0,240,255,.5)}
        .tr{display:flex;flex-wrap:wrap;gap:5px}
        .tt{font-family:var(--mono);font-size:8px;padding:3px 8px;border-radius:3px;background:rgba(255,255,255,.03);border:1px solid var(--b1);color:var(--muted);transition:all .2s}
        .tt:hover{border-color:var(--cyan);color:var(--cyan)}

        @media(max-width:900px){
          .hero-row{grid-template-columns:1fr}
          .terminal{display:none}
          .main-cols{grid-template-columns:1fr}
          .bottom-row{grid-template-columns:1fr}
          .stats{grid-template-columns:repeat(2,1fr)}
        }
      </style>
    </head>
    <body>
      <div class="glow g1"></div>
      <div class="glow g2"></div>
      <div class="page">

        <!-- TOP BAR -->
        <div class="topbar">
          <div class="tb-left">
            <div>
              <div class="by-name">⚡ Praveen Bharati</div>
              <div class="by-role">DevOps Engineer · GitOps · Kubernetes · ArgoCD</div>
            </div>
            <div class="divider"></div>
            <div class="logo"><span class="lq">QUAD</span><span class="lu">_</span><span class="lc">CART</span></div>
          </div>
          <div class="tb-right">
            <div class="pill live">K8s · Live</div>
            <div class="pill argo">ArgoCD · Synced</div>
            <div class="pill" style="background:rgba(112,0,255,.07);border:1px solid rgba(112,0,255,.2);color:#a855f7">Kind Cluster</div>
          </div>
        </div>

        <!-- HERO ROW -->
        <div class="hero-row">
          <div class="hero-left">
            <div class="hero-eyebrow">GitOps · 11 Microservices · nginx:alpine · ConfigMap · No Docker Build</div>
            <h1>
              <span class="h1a">Q</span>
              <span class="h1b">UAD</span>
              <span class="h1c">_CART</span>
            </h1>
            <p class="hero-desc">
              <strong>Production-grade</strong> distributed e-commerce on <strong>Kubernetes</strong>.
              11 microservices (Go · Python · Java · Node.js · C#) deployed via
              <strong>ArgoCD GitOps</strong> on a Kind cluster. Every git push auto-syncs. Zero manual steps.
            </p>
            <div class="hero-btns">
              <button class="btn p">EXPLORE STORE</button>
              <button class="btn g">VIEW PIPELINE →</button>
            </div>
          </div>
          <div class="terminal">
            <div class="tbar">
              <div class="tdot" style="background:#ff5f57"></div>
              <div class="tdot" style="background:#febc2e"></div>
              <div class="tdot" style="background:#28c840"></div>
              <span class="ttitle">argocd · production</span>
            </div>
            <div class="tl"><span class="td">$</span> <span class="tc">kubectl</span> <span class="tw">get pods -n production</span></div>
            <div class="tl" style="margin-top:5px"><span class="tg">✔</span> <span class="tw">frontend</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">cartservice</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">checkoutservice</span>&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">paymentservice</span>&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">productcatalog</span>&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">recommendation</span>&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">shippingservice</span>&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">adservice</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">emailservice</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">currencyservice</span>&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl"><span class="tg">✔</span> <span class="tw">redis</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
            <div class="tl" style="margin-top:6px"><span class="td">Health:</span> <span class="tg">Healthy</span> &nbsp;<span class="td">Sync:</span> <span class="tc">Synced · 1m ago</span></div>
            <div class="tl"><span class="td">$</span> <span class="cur"></span></div>
          </div>
        </div>

        <!-- STATS -->
        <div class="stats">
          <div class="stat"><div class="slbl">Microservices</div><div class="sval">11</div><div class="ssub">↑ All healthy · K8s</div></div>
          <div class="stat"><div class="slbl">Uptime SLA</div><div class="sval">99.99%</div><div class="ssub">↑ GitOps zero-drift</div></div>
          <div class="stat"><div class="slbl">ArgoCD Syncs</div><div class="sval">1,204</div><div class="ssub">↑ auto-sync · today: 18</div></div>
          <div class="stat"><div class="slbl">Orders / Day</div><div class="sval">2.4M</div><div class="ssub">↑ 26% this month</div></div>
        </div>

        <!-- PRODUCTS + SERVICES -->
        <div class="main-cols">
          <!-- PRODUCTS -->
          <div>
            <div class="sec-title">Product Catalog</div>
            <div class="sec-sub">// productcatalogservice · Go · gRPC · ConfigMap mounted</div>
            <div class="pgrid">
              <div class="pc"><div class="pc-img"><div class="pc-bg" style="background:linear-gradient(135deg,#0d001f,#1a0040)"></div><span class="pc-em">⌚</span></div><div class="pc-b"><div class="pc-cat">Wearables</div><div class="pc-n">ProWatch Ultra X</div><div class="pc-f"><div class="pc-p">₹24,999</div><button class="pc-add">+</button></div></div></div>
              <div class="pc"><div class="pc-img"><div class="pc-bg" style="background:linear-gradient(135deg,#001a1a,#003030)"></div><span class="pc-em">💻</span></div><div class="pc-b"><div class="pc-cat">Laptops</div><div class="pc-n">QuadBook Pro 16</div><div class="pc-f"><div class="pc-p">₹1,49,999</div><button class="pc-add">+</button></div></div></div>
              <div class="pc"><div class="pc-img"><div class="pc-bg" style="background:linear-gradient(135deg,#1a0800,#2d1200)"></div><span class="pc-em">🎧</span></div><div class="pc-b"><div class="pc-cat">Audio</div><div class="pc-n">SoundDome ANC Pro</div><div class="pc-f"><div class="pc-p">₹8,999</div><button class="pc-add">+</button></div></div></div>
