apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: production
  labels:
    app: frontend
    component: ui
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>QUAD_CART — Praveen Bharati</title>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#03030a;--bg2:#09090f;--bg3:#0f0f1a;--bg4:#141424;
          --b1:rgba(255,255,255,0.07);--b2:rgba(255,255,255,0.13);--b3:rgba(255,255,255,0.2);
          --cyan:#00e5ff;--violet:#7c3aed;--pink:#f43f5e;--green:#22d37a;--amber:#f59e0b;
          --txt:#f0f0fa;--muted:#6b7280;--muted2:#9ca3af;
          --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
          --r:12px;--r2:16px;
        }
        html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;overflow-x:hidden;font-size:16px}

        /* BG effects */
        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
          background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),
          linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);
          background-size:56px 56px}
        .g1{position:fixed;width:900px;height:900px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.18),transparent 70%);top:-400px;left:-300px;z-index:0;pointer-events:none}
        .g2{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(0,229,255,0.1),transparent 70%);bottom:-300px;right:-200px;z-index:0;pointer-events:none}

        .wrap{position:relative;z-index:1;padding:0 40px 60px}

        /* ════════════════════════════════
           TOPBAR
        ════════════════════════════════ */
        .topbar{
          display:flex;align-items:center;justify-content:space-between;
          padding:18px 0;border-bottom:1px solid var(--b1);margin-bottom:0;
        }
        .tb-brand{display:flex;align-items:center;gap:20px}
        .author{display:flex;flex-direction:column;gap:2px}
        .author-name{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--cyan);
          letter-spacing:.03em;text-shadow:0 0 20px rgba(0,229,255,.4)}
        .author-name::before{content:'⚡ '}
        .author-role{font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.02em}
        .sep{width:1px;height:36px;background:var(--b2)}
        .logo{font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:.05em;display:flex;align-items:center;gap:1px}
        .lq{color:var(--cyan);text-shadow:0 0 24px rgba(0,229,255,.55)}
        .lu{color:var(--muted)}.lc{color:var(--txt)}
        .tb-pills{display:flex;align-items:center;gap:8px}
        .tpill{font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:6px;display:flex;align-items:center;gap:7px;font-weight:500}
        .tpill.live{background:rgba(34,211,122,.07);border:1px solid rgba(34,211,122,.25);color:var(--green)}
        .tpill.live::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s ease-in-out infinite;flex-shrink:0}
        .tpill.argo{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.25);color:var(--cyan)}
        .tpill.kind{background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.3);color:#a78bfa}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.75)}}

        /* ════════════════════════════════
           HERO  (full width, 2 col)
        ════════════════════════════════ */
        .hero{
          display:grid;grid-template-columns:1fr 420px;gap:40px;
          padding:48px 0 40px;border-bottom:1px solid var(--b1);
          align-items:center;
        }
        .hero-tag{
          display:inline-flex;align-items:center;gap:8px;
          font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;
          color:var(--cyan);border:1px solid rgba(0,229,255,.2);padding:6px 14px;border-radius:6px;
          background:rgba(0,229,255,.05);margin-bottom:24px;
        }
        .hero-tag::before{content:'▶';font-size:9px}
        h1{font-size:72px;font-weight:900;line-height:.95;letter-spacing:-3px;margin-bottom:24px}
        .h1a{display:block;color:var(--cyan);text-shadow:0 0 60px rgba(0,229,255,.35)}
        .h1b{display:block;color:#fff}
        .h1c{display:block;-webkit-text-stroke:1.5px rgba(255,255,255,.2);color:transparent}
        .hero-desc{font-size:16px;color:var(--muted2);line-height:1.75;max-width:560px;margin-bottom:32px}
        .hero-desc strong{color:var(--txt);font-weight:600}
        .hero-btns{display:flex;gap:12px}
        .btn{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:13px 28px;border-radius:8px;cursor:pointer;transition:all .18s;border:none}
        .btn.primary{background:var(--cyan);color:#000;box-shadow:0 0 32px rgba(0,229,255,.3)}
        .btn.primary:hover{box-shadow:0 0 56px rgba(0,229,255,.55);transform:translateY(-2px)}
        .btn.ghost{background:transparent;color:var(--txt);border:1px solid var(--b2);font-family:var(--mono)}
        .btn.ghost:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05)}

        /* terminal */
        .terminal{background:var(--bg2);border:1px solid var(--b2);border-radius:14px;overflow:hidden}
        .tbar{display:flex;align-items:center;gap:7px;padding:12px 16px;background:var(--bg3);border-bottom:1px solid var(--b1)}
        .tdot{width:12px;height:12px;border-radius:50%}
        .ttitle{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto}
        .tbody{padding:16px 18px}
        .tl{font-family:var(--mono);font-size:12px;margin:3px 0;line-height:1.65;display:flex;gap:8px}
        .tl-cmd{color:var(--muted2)}
        .tl .cmd{color:var(--cyan)}.tl .w{color:var(--txt)}.tl .ok{color:var(--green)}.tl .svc{color:var(--txt);min-width:160px;display:inline-block}.tl .dim{color:var(--muted)}
        .cur{display:inline-block;width:8px;height:13px;background:var(--cyan);vertical-align:middle;animation:blink 1s step-end infinite;margin-left:2px}
        @keyframes blink{50%{opacity:0}}

        /* ════════════════════════════════
           STATS
        ════════════════════════════════ */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:32px 0;border-bottom:1px solid var(--b1)}
        .stat{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r2);padding:24px 24px 20px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:default}
        .stat::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.3}
        .stat:hover{border-color:rgba(0,229,255,.25);transform:translateY(-3px)}
        .stat-lbl{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:12px}
        .stat-val{font-size:36px;font-weight:800;letter-spacing:-1.5px;color:#fff;margin-bottom:6px}
        .stat-sub{font-family:var(--mono);font-size:11px;color:var(--green)}

        /* ════════════════════════════════
           SECTION LABEL
        ════════════════════════════════ */
        .sec{padding:32px 0 0}
        .sec-head{display:flex;align-items:baseline;gap:12px;margin-bottom:20px}
        .sec-title{font-size:22px;font-weight:700;letter-spacing:-.5px}
        .sec-sub{font-family:var(--mono);font-size:11px;color:var(--muted)}

        /* ════════════════════════════════
           TWO-COL GRID
        ════════════════════════════════ */
        .two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding-bottom:32px;border-bottom:1px solid var(--b1)}

        /* PRODUCTS */
        .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
        .pc{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .2s}
        .pc:hover{border-color:rgba(0,229,255,.3);transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
        .pc-img{height:100px;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative}
        .pc-bg{position:absolute;inset:0}
        .pc-em{position:relative;z-index:1;filter:drop-shadow(0 0 12px rgba(0,229,255,.3))}
        .pc-body{padding:12px 14px}
        .pc-cat{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--cyan);margin-bottom:4px}
        .pc-name{font-size:13px;font-weight:700;margin-bottom:10px;line-height:1.3}
        .pc-foot{display:flex;align-items:center;justify-content:space-between}
        .pc-price{font-family:var(--mono);font-size:14px;font-weight:700;color:#fff}
        .pc-add{width:26px;height:26px;border-radius:6px;font-size:16px;background:rgba(0,229,255,.1);border:1px solid rgba(0,229,255,.3);color:var(--cyan);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
        .pc-add:hover{background:var(--cyan);color:#000;box-shadow:0 0 12px rgba(0,229,255,.5)}

        /* MICROSERVICES */
        .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .svc{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;cursor:default}
        .svc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px}
        .svc.cc::before{background:var(--cyan)}.svc.cv::before{background:var(--violet)}
        .svc.cp::before{background:var(--pink)}.svc.cg::before{background:var(--green)}
        .svc.ca::before{background:var(--amber)}
        .svc:hover{border-color:var(--b2);transform:translateY(-2px)}
        .svc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
        .svc-left{display:flex;align-items:center;gap:8px}
        .svc-ico{font-size:16px}
        .svc-name{font-size:14px;font-weight:700;color:var(--txt)}
        .svc-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
        .svc-meta{font-family:var(--mono);font-size:11px;color:var(--muted2)}

        /* ════════════════════════════════
           PIPELINE
        ════════════════════════════════ */
        .pipe-sec{padding:32px 0;border-bottom:1px solid var(--b1)}
        .pipe-card{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r2);padding:28px 32px;position:relative;overflow:hidden}
        .pipe-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--green))}
        .pipe-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
        .pipe-title{font-size:16px;font-weight:700}
        .pipe-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
        .synced-pill{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:7px;background:rgba(34,211,122,.07);border:1px solid rgba(34,211,122,.2);color:var(--green);padding:7px 14px;border-radius:8px;font-weight:500}
        .synced-pill::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
        .steps{display:flex;align-items:center}
        .step{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
        .step-box{width:60px;height:60px;border-radius:16px;font-size:26px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--b2);margin-bottom:10px;position:relative;transition:all .2s}
        .step-box.done{border-color:rgba(0,229,255,.45);box-shadow:0 0 20px rgba(0,229,255,.12)}
        .step-box.done::after{content:'✓';position:absolute;top:-7px;right:-7px;width:18px;height:18px;background:var(--green);border-radius:50%;font-size:10px;font-weight:900;color:#000;display:flex;align-items:center;justify-content:center}
        .step-name{font-size:12px;font-weight:600;color:var(--txt);text-align:center}
        .step-meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px;text-align:center}
        .wire{flex:1;height:2px;background:var(--b2);min-width:24px;position:relative;overflow:hidden}
        .wire-flow{position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);animation:flow 2s linear infinite}
        @keyframes flow{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

        /* ════════════════════════════════
           BOTTOM GRID: ArgoCD + K8s
        ════════════════════════════════ */
        .bottom{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:32px 0 0}
        .card{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r2);padding:24px}
        .card-title{font-size:14px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:18px;display:flex;align-items:center;gap:8px}
        .card-title::before{content:'';width:3px;height:14px;border-radius:2px;background:var(--cyan);flex-shrink:0}

        /* argo rows */
        .arow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;margin-bottom:8px;background:var(--bg2);border:1px solid var(--b1);transition:border-color .2s}
        .arow:hover{border-color:var(--b2)}
        .arow-l{display:flex;align-items:center;gap:10px}
        .aico{font-size:16px}
        .aname{font-size:14px;font-weight:600}
        .ans{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
        .abadges{display:flex;gap:6px}
        .ab{font-family:var(--mono);font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px}
        .ab.h{background:rgba(34,211,122,.1);color:var(--green);border:1px solid rgba(34,211,122,.2)}
        .ab.s{background:rgba(0,229,255,.1);color:var(--cyan);border:1px solid rgba(0,229,255,.2)}

        /* k8s nodes */
        .nodes{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
        .knode{background:var(--bg2);border:1px solid var(--b1);border-radius:10px;padding:14px 12px;text-align:center}
        .knode-name{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:6px}
        .knode-status{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--green);margin-bottom:4px}
        .knode-cpu{font-family:var(--mono);font-size:10px;color:var(--muted2);margin-bottom:6px}
        .kbar{height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
        .kfill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--violet))}
        .pods{display:flex;flex-wrap:wrap;gap:6px}
        .pod{font-family:var(--mono);font-size:10px;padding:4px 9px;border-radius:5px;background:rgba(34,211,122,.07);border:1px solid rgba(34,211,122,.18);color:var(--green)}

        /* ════════════════════════════════
           FOOTER
        ════════════════════════════════ */
        .footer{border-top:1px solid var(--b1);margin-top:40px;padding-top:24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
        .footer-by{font-family:var(--mono);font-size:13px;font-weight:700}
        .footer-by span{color:var(--cyan);text-shadow:0 0 16px rgba(0,229,255,.4)}
        .tags{display:flex;flex-wrap:wrap;gap:6px}
        .tag{font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:5px;background:rgba(255,255,255,.03);border:1px solid var(--b1);color:var(--muted2);transition:all .2s;cursor:default}
        .tag:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,.05)}

        @media(max-width:1100px){
          h1{font-size:52px}
          .hero{grid-template-columns:1fr 360px}
        }
        @media(max-width:860px){
          .hero{grid-template-columns:1fr}.terminal{display:none}
          .two-col,.bottom{grid-template-columns:1fr}
          .stats{grid-template-columns:repeat(2,1fr)}
          .pgrid{grid-template-columns:repeat(2,1fr)}
        }
      </style>
    </head>
    <body>
      <div class="g1"></div><div class="g2"></div>
      <div class="wrap">

        <!-- ── TOPBAR ── -->
        <div class="topbar">
          <div class="tb-brand">
            <div class="author">
              <div class="author-name">Praveen Bharati</div>
              <div class="author-role">DevOps Engineer · GitOps · Kubernetes · ArgoCD</div>
            </div>
            <div class="sep"></div>
            <div class="logo"><span class="lq">QUAD</span><span class="lu">_</span><span class="lc">CART</span></div>
          </div>
          <div class="tb-pills">
            <div class="tpill live">K8s · Live</div>
            <div class="tpill argo">ArgoCD · Synced</div>
            <div class="tpill kind">Kind Cluster</div>
          </div>
        </div>

        <!-- ── HERO ── -->
        <div class="hero">
          <div>
            <div class="hero-tag">GitOps · 11 Microservices · nginx:alpine · ConfigMap · No Docker Build</div>
            <h1>
              <span class="h1a">Q</span>
              <span class="h1b">UAD</span>
              <span class="h1c">_CART</span>
            </h1>
            <p class="hero-desc">
              <strong>Production-grade</strong> distributed e-commerce running
              <strong>11 microservices</strong> on <strong>Kubernetes</strong>.
              Deployed via <strong>ArgoCD GitOps</strong> on a Kind cluster —
              every git push auto-syncs. Zero manual steps. Zero downtime.
            </p>
            <div class="hero-btns">
              <button class="btn primary">EXPLORE STORE</button>
              <button class="btn ghost">VIEW PIPELINE →</button>
            </div>
          </div>
          <div class="terminal">
            <div class="tbar">
              <div class="tdot" style="background:#ff5f57"></div>
              <div class="tdot" style="background:#febc2e"></div>
              <div class="tdot" style="background:#28c840"></div>
              <span class="ttitle">argocd · production · quad-cart</span>
            </div>
            <div class="tbody">
              <div class="tl"><span class="dim">$</span> <span class="cmd">kubectl</span> <span class="w">get pods -n production</span></div>
              <div style="height:8px"></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">frontend</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">cartservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">checkoutservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">paymentservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">productcatalog</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">recommendation</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">shippingservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">adservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">emailservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">currencyservice</span><span class="ok">Running</span></div>
              <div class="tl"><span class="ok">✔</span> <span class="svc">redis</span><span class="ok">Running</span></div>
              <div style="height:8px"></div>
              <div class="tl"><span class="dim">Health:</span> <span class="ok">Healthy</span> &nbsp; <span class="dim">Sync:</span> <span class="cmd">Synced · 1m ago</span></div>
              <div class="tl"><span class="dim">$</span><span class="cur"></span></div>
            </div>
          </div>
        </div>

        <!-- ── STATS ── -->
        <div class="stats">
          <div class="stat">
            <div class="stat-lbl">Microservices</div>
            <div class="stat-val">11</div>
            <div class="stat-sub">↑ All healthy · Kubernetes</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Uptime SLA</div>
            <div class="stat-val">99.99%</div>
            <div class="stat-sub">↑ GitOps zero-drift</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">ArgoCD Syncs</div>
            <div class="stat-val">1,204</div>
            <div class="stat-sub">↑ Auto-sync · today: 18</div>
          </div>
          <div class="stat">
            <div class="stat-lbl">Orders / Day</div>
            <div class="stat-val">2.4M</div>
            <div class="stat-sub">↑ 26% this month</div>
          </div>
        </div>

        <!-- ── PRODUCTS + MICROSERVICES ── -->
        <div class="sec">
          <div class="two-col">
            <div>
