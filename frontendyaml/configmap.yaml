apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-html
  namespace: production
  labels:
    app: frontend
    component: ui
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8"/>
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>QUAD_CART — Praveen Bharati</title>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
      <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{
          --bg:#020207;--bg2:#07070f;--bg3:#0d0d1a;--surface:#111122;
          --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.11);
          --cyan:#00f0ff;--violet:#7000ff;--pink:#ff2d78;--green:#00ff8c;--amber:#ffb800;
          --txt:#e2e2f0;--muted:#55556e;
          --mono:'JetBrains Mono',monospace;--sans:'Outfit',sans-serif;
        }
        html,body{background:var(--bg);color:var(--txt);font-family:var(--sans);min-height:100vh;overflow-x:hidden}

        /* scanlines */
        body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
          background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,240,255,0.012) 2px,rgba(0,240,255,0.012) 4px)}
        /* grid */
        body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
          background-image:linear-gradient(rgba(0,240,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,0.025) 1px,transparent 1px);
          background-size:52px 52px}

        .glow{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(150px)}
        .g1{width:900px;height:900px;background:var(--violet);top:-350px;left:-250px;opacity:.09}
        .g2{width:700px;height:700px;background:var(--cyan);bottom:-250px;right:-150px;opacity:.06}
        .g3{width:500px;height:500px;background:var(--pink);top:35%;left:35%;opacity:.04}

        .page{position:relative;z-index:1;max-width:1140px;margin:0 auto;padding:0 28px 100px}

        /* NAV */
        nav{display:flex;align-items:center;justify-content:space-between;padding:22px 0;border-bottom:1px solid var(--b1);margin-bottom:68px}
        .logo{font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:1px}
        .lq{color:var(--cyan);text-shadow:0 0 24px rgba(0,240,255,.65)}
        .lu{color:var(--muted)}
        .lc{color:#fff}
        .nav-r{display:flex;align-items:center;gap:10px}
        .npill{font-family:var(--mono);font-size:10px;padding:5px 11px;border-radius:5px;display:flex;align-items:center;gap:7px}
        .npill.live{background:rgba(0,255,140,.06);border:1px solid rgba(0,255,140,.2);color:var(--green)}
        .npill.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:blink 1.8s ease-in-out infinite}
        .npill.argo{background:rgba(0,240,255,.06);border:1px solid rgba(0,240,255,.2);color:var(--cyan)}
        @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.8)}}

        /* HERO */
        .hero{margin-bottom:76px}
        .hero-tag{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(0,240,255,.2);padding:5px 14px;border-radius:4px;margin-bottom:30px;background:rgba(0,240,255,.04)}
        .hero-tag::before{content:'▶';font-size:8px}
        .hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:40px;flex-wrap:wrap}
        .hero-left{flex:1;min-width:280px}
        h1{font-size:clamp(3.2rem,7.5vw,6.5rem);font-weight:900;line-height:.93;letter-spacing:-3px;margin-bottom:26px}
        .h1a{display:block;color:var(--cyan);text-shadow:0 0 60px rgba(0,240,255,.4),0 0 120px rgba(0,240,255,.15)}
        .h1b{display:block;color:#fff}
        .h1c{display:block;-webkit-text-stroke:1px rgba(255,255,255,.25);color:transparent}
        .hero-desc{font-size:15px;color:var(--muted);line-height:1.8;max-width:460px;margin-bottom:30px}
        .hero-desc strong{color:var(--txt);font-weight:500}
        .hero-btns{display:flex;gap:11px;flex-wrap:wrap}
        .bcyber{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:11px 26px;border-radius:6px;cursor:pointer;transition:all .15s}
        .bcyber.p{background:var(--cyan);color:#000;border:none;box-shadow:0 0 30px rgba(0,240,255,.35),inset 0 1px 0 rgba(255,255,255,.3)}
        .bcyber.p:hover{box-shadow:0 0 60px rgba(0,240,255,.6);transform:translateY(-1px)}
        .bcyber.g{background:transparent;color:var(--txt);border:1px solid var(--b2)}
        .bcyber.g:hover{border-color:var(--cyan);color:var(--cyan)}

        /* TERMINAL */
        .terminal{background:var(--bg2);border:1px solid var(--b2);border-radius:12px;padding:18px 20px;flex-shrink:0;width:310px;font-family:var(--mono);font-size:11.5px}
        .tbar{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding-bottom:11px;border-bottom:1px solid var(--b1)}
        .tdot{width:10px;height:10px;border-radius:50%}
        .ttitle{font-size:10px;color:var(--muted);margin-left:auto}
        .tl{margin:3px 0;line-height:1.7}
        .td{color:var(--muted)}.tg{color:var(--green)}.tc{color:var(--cyan)}.tw{color:var(--txt)}.tp{color:var(--pink)}
        .cur{display:inline-block;width:8px;height:13px;background:var(--cyan);vertical-align:middle;animation:cur 1s step-end infinite}
        @keyframes cur{50%{opacity:0}}

        /* STATS */
        .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:70px}
        .stat{background:var(--bg3);border:1px solid var(--b1);border-radius:12px;padding:20px 16px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s}
        .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.35}
        .stat:hover{border-color:rgba(0,240,255,.22);transform:translateY(-2px)}
        .slbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px}
        .sval{font-size:28px;font-weight:800;letter-spacing:-1px;color:#fff}
        .ssub{font-family:var(--mono);font-size:10px;color:var(--green);margin-top:5px}

        /* SECTION HEADER */
        .sh{margin-bottom:26px}
        .sh-t{font-size:19px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
        .sh-s{font-family:var(--mono);font-size:10px;color:var(--muted)}

        /* PRODUCTS */
        .pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:70px}
        .pc{background:var(--bg3);border:1px solid var(--b1);border-radius:15px;overflow:hidden;cursor:pointer;transition:border-color .25s,transform .25s,box-shadow .25s;position:relative}
        .pc::after{content:'';position:absolute;inset:0;border-radius:15px;background:linear-gradient(135deg,rgba(0,240,255,.04),transparent 60%);pointer-events:none}
        .pc:hover{border-color:rgba(0,240,255,.35);transform:translateY(-5px);box-shadow:0 22px 55px rgba(0,0,0,.6),0 0 35px rgba(0,240,255,.08)}
        .pc-img{height:150px;display:flex;align-items:center;justify-content:center;font-size:52px;position:relative;overflow:hidden}
        .pc-bg{position:absolute;inset:0}
        .pc-em{position:relative;z-index:1;filter:drop-shadow(0 0 18px rgba(0,240,255,.35))}
        .pc-b{padding:15px}
        .pc-cat{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px;color:var(--cyan)}
        .pc-n{font-size:13px;font-weight:700;margin-bottom:3px}
        .pc-d{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5}
        .pc-f{display:flex;align-items:center;justify-content:space-between}
        .pc-p{font-family:var(--mono);font-size:15px;font-weight:700;color:#fff}
        .pc-p small{font-size:9px;color:var(--muted);font-weight:400}
        .pc-add{width:28px;height:28px;border-radius:6px;font-size:16px;background:rgba(0,240,255,.1);border:1px solid rgba(0,240,255,.25);color:var(--cyan);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s}
        .pc-add:hover{background:var(--cyan);color:#000;transform:scale(1.1);box-shadow:0 0 14px rgba(0,240,255,.5)}

        /* MICROSERVICES ARCHITECTURE */
        .arch-wrap{margin-bottom:70px}
        .arch-box{background:var(--bg3);border:1px solid var(--b1);border-radius:16px;padding:28px;position:relative;overflow:hidden}
        .arch-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--green))}
        .arch-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
        .arch-title{font-family:var(--mono);font-size:11px;color:var(--muted)}
        .arch-title strong{color:var(--cyan)}
        .synced{font-family:var(--mono);font-size:10px;display:flex;align-items:center;gap:7px;background:rgba(0,255,140,.07);border:1px solid rgba(0,255,140,.2);color:var(--green);padding:5px 11px;border-radius:5px}
        .synced::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2s infinite}

        /* service grid */
        .svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
        .svc{background:var(--bg2);border:1px solid var(--b1);border-radius:11px;padding:14px 12px;transition:border-color .2s,transform .2s;cursor:default;position:relative;overflow:hidden}
        .svc::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:0}
        .svc.c-cyan::before{background:var(--cyan)}
        .svc.c-violet::before{background:var(--violet)}
        .svc.c-pink::before{background:var(--pink)}
        .svc.c-green::before{background:var(--green)}
        .svc.c-amber::before{background:var(--amber)}
        .svc:hover{border-color:var(--b2);transform:translateY(-2px)}
        .svc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
        .svc-ico{font-size:18px}
        .svc-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2.5s ease-in-out infinite}
        .svc-name{font-size:12px;font-weight:700;margin-bottom:2px}
        .svc-type{font-family:var(--mono);font-size:9px;color:var(--muted);margin-bottom:7px}
        .svc-tags{display:flex;flex-wrap:wrap;gap:4px}
        .stag{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--muted)}

        /* PIPELINE */
        .pipe-wrap{margin-bottom:70px}
        .pipe-box{background:var(--bg3);border:1px solid var(--b1);border-radius:16px;padding:26px 26px 30px;position:relative;overflow:hidden}
        .pipe-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--cyan),var(--green))}
        .pipe-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
        .pipe-lbl{font-family:var(--mono);font-size:11px;color:var(--muted)}
        .pipe-lbl strong{color:var(--cyan)}
        .steps{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px}
        .snode{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
        .sbox{width:52px;height:52px;border-radius:13px;font-size:22px;display:flex;align-items:center;justify-content:center;background:var(--bg2);border:1px solid var(--b2);margin-bottom:9px;position:relative;transition:border-color .2s}
        .sbox.done{border-color:rgba(0,240,255,.4);box-shadow:0 0 18px rgba(0,240,255,.12),inset 0 0 18px rgba(0,240,255,.04)}
        .sbox.done::after{content:'✓';position:absolute;top:-7px;right:-7px;width:15px;height:15px;background:var(--green);border-radius:50%;font-size:8px;font-weight:900;color:#000;display:flex;align-items:center;justify-content:center}
        .sname{font-size:10px;font-weight:600;color:var(--txt);text-align:center}
        .smeta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;text-align:center}
        .wire{flex:1;height:2px;background:var(--b2);min-width:20px;position:relative;overflow:hidden;flex-shrink:0}
        .wflow{position:absolute;inset:0;background:linear-gradient(90deg,transparent,var(--cyan) 50%,transparent);animation:wf 2s linear infinite}
        @keyframes wf{from{transform:translateX(-100%)}to{transform:translateX(200%)}}

        /* INFRA */
        .ig{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:70px}
        .ic{background:var(--bg3);border:1px solid var(--b1);border-radius:15px;padding:20px}
        .ich{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:16px;display:flex;align-items:center;gap:7px}
        .ich::before{content:'';width:3px;height:11px;border-radius:2px;background:var(--cyan)}
        .arow{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:8px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--b1);transition:border-color .2s}
        .arow:hover{border-color:var(--b2)}
        .arl{display:flex;align-items:center;gap:9px}
        .aico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
        .an{font-size:12px;font-weight:600}
        .ans{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:1px}
        .abs{display:flex;gap:4px}
        .ab{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase}
        .ab.h{background:rgba(0,255,140,.1);color:var(--green);border:1px solid rgba(0,255,140,.2)}
        .ab.s{background:rgba(0,240,255,.1);color:var(--cyan);border:1px solid rgba(0,240,255,.2)}
        .ng{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:13px}
        .kn{background:var(--bg2);border:1px solid var(--b1);border-radius:8px;padding:10px 8px;text-align:center}
        .knn{font-family:var(--mono);font-size:8px;color:var(--muted);margin-bottom:4px}
        .kns{font-family:var(--mono);font-size:10px;font-weight:700;color:var(--green)}
        .knc{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}
        .knb{height:3px;background:var(--b2);border-radius:2px;margin-top:5px;overflow:hidden}
        .knf{height:100%;border-radius:2px;background:var(--cyan)}
        .pr{display:flex;flex-wrap:wrap;gap:5px}
        .pt{font-family:var(--mono);font-size:8px;padding:3px 7px;border-radius:3px;background:rgba(0,255,140,.07);border:1px solid rgba(0,255,140,.18);color:var(--green)}

        /* BUILT BY */
        .bb{border-top:1px solid var(--b1);padding-top:60px;text-align:center}
        .bbl{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.18em;margin-bottom:14px}
        .bbn{font-size:clamp(2.2rem,5.5vw,4rem);font-weight:900;letter-spacing:-2px;line-height:1;color:#fff;text-shadow:0 0 60px rgba(0,240,255,.2);margin-bottom:8px}
        .bbn span{color:var(--cyan);text-shadow:0 0 40px rgba(0,240,255,.55)}
        .bbr{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:24px;letter-spacing:.04em}
        .tr{display:flex;flex-wrap:wrap;justify-content:center;gap:7px}
        .tt{font-family:var(--mono);font-size:9px;padding:4px 11px;border-radius:4px;background:rgba(255,255,255,.03);border:1px solid var(--b2);color:var(--muted);transition:all .2s;cursor:default}
        .tt:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,240,255,.05)}

        @keyframes fadeUp{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
        .fu{animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
        .d1{animation-delay:.05s}.d2{animation-delay:.15s}.d3{animation-delay:.25s}
        .d4{animation-delay:.35s}.d5{animation-delay:.45s}.d6{animation-delay:.55s}

        @media(max-width:900px){
          .stats{grid-template-columns:repeat(2,1fr)}
          .pgrid{grid-template-columns:repeat(2,1fr)}
          .svc-grid{grid-template-columns:repeat(2,1fr)}
          .ig{grid-template-columns:1fr}
          .terminal{width:100%}
        }
        @media(max-width:520px){
          .pgrid{grid-template-columns:1fr}
          .stats{grid-template-columns:repeat(2,1fr)}
        }
      </style>
    </head>
    <body>
      <div class="glow g1"></div>
      <div class="glow g2"></div>
      <div class="glow g3"></div>
      <div class="page">

        <!-- NAV -->
        <nav class="fu">
          <div class="logo"><span class="lq">QUAD</span><span class="lu">_</span><span class="lc">CART</span></div>
          <div class="nav-r">
            <div class="npill live">K8s · Live</div>
            <div class="npill argo">ArgoCD · Synced</div>
          </div>
        </nav>

        <!-- HERO -->
        <section class="hero fu d1">
          <div class="hero-tag">GitOps · Kubernetes · Kind Cluster · 11 Microservices · nginx:alpine</div>
          <div class="hero-row">
            <div class="hero-left">
              <h1>
                <span class="h1a">Q</span>
                <span class="h1b">UAD</span>
                <span class="h1c">_CART</span>
              </h1>
              <p class="hero-desc">
                A <strong>production-grade</strong> distributed e-commerce platform running
                <strong>11 microservices</strong> on <strong>Kubernetes</strong>.
                Deployed continuously via <strong>ArgoCD GitOps</strong> —
                every git push ships to the Kind cluster. Zero downtime. Zero manual steps.
              </p>
              <div class="hero-btns">
                <button class="bcyber p">EXPLORE STORE</button>
                <button class="bcyber g">VIEW PIPELINE →</button>
              </div>
            </div>
            <div class="terminal">
              <div class="tbar">
                <div class="tdot" style="background:#ff5f57"></div>
                <div class="tdot" style="background:#febc2e"></div>
                <div class="tdot" style="background:#28c840"></div>
                <span class="ttitle">argocd · quad-cart · production</span>
              </div>
              <div class="tl"><span class="td">$</span> <span class="tc">kubectl</span> <span class="tw">get pods -n production</span></div>
              <div class="tl" style="margin-top:7px"><span class="tg">✔</span> <span class="tw">frontend</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">cartservice</span>&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">checkoutservice</span> <span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">paymentservice</span> <span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">productcatalog</span>&nbsp;<span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">recommendationsvc</span> <span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">shippingservice</span> <span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">adservice</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">emailservice</span>&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">currencyservice</span> <span class="tg">Running</span></div>
              <div class="tl"><span class="tg">✔</span> <span class="tw">redis</span>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="tg">Running</span></div>
              <div class="tl" style="margin-top:8px"><span class="td">$</span> <span class="tc">argocd</span> <span class="tw">app get quad-cart</span></div>
              <div class="tl"><span class="td">Health:</span> <span class="tg">Healthy</span>&nbsp;&nbsp;<span class="td">Sync:</span> <span class="tc">Synced</span></div>
              <div class="tl" style="margin-top:7px"><span class="td">$</span> <span class="cur"></span></div>
            </div>
          </div>
        </section>

        <!-- STATS -->
        <div class="stats fu d2">
          <div class="stat"><div class="slbl">Microservices</div><div class="sval">11</div><div class="ssub">↑ All healthy · K8s</div></div>
          <div class="stat"><div class="slbl">Uptime SLA</div><div class="sval">99.99%</div><div class="ssub">↑ GitOps zero-drift</div></div>
          <div class="stat"><div class="slbl">Auto-Syncs</div><div class="sval">1,204</div><div class="ssub">↑ ArgoCD · today: 18</div></div>
          <div class="stat"><div class="slbl">Orders / Day</div><div class="sval">2.4M</div><div class="ssub">↑ 26% this month</div></div>
        </div>

        <!-- PRODUCTS -->
